name: Redmine Discrepancy Alerts

on:
  repository_dispatch:
    types: [redmine-webhook]
  workflow_dispatch:
    inputs:
      ticket_id:
        description: 'Redmine ticket ID to check'
        required: false

jobs:
  check-ticket:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Run checker
        env:
          TICKET_ID: ${{ github.event.client_payload.ticket_id || github.event.inputs.ticket_id }}
        run: python checker.py
