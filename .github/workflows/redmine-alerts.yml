name: Redmine Discrepancy Alerts

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [cron-trigger]

jobs:
  check-tickets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore state
        uses: actions/cache@v4
        with:
          path: state.json
          key: redmine-state-${{ github.run_id }}
          restore-keys: redmine-state-

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Run checker
        env:
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
        run: python checker.py

      - name: Save state
        uses: actions/cache@v4
        with:
          path: state.json
          key: redmine-state-${{ github.run_id }}
